<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: 'Segoe UI'; background:#f5f6fa; padding:20px }
.container { max-width:1000px; margin:auto }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px }
input,select { width:100%; padding:10px; margin-top:10px }
button { padding:10px; width:100%; margin-top:10px; background:#ff4757; color:white; border:none }
table { width:100%; margin-top:20px }
th,td { padding:10px; text-align:center }
th { background:#ff4757; color:white }
.err{
  color:red;
  font-size:12px;
  display:block;
  margin-bottom:5px;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
<h2>Add Product</h2>

<input type="text" id="name" placeholder="Product Name" required>
<small id="nameErr" class="err"></small>
<input type="number" id="price" placeholder="Price" required>
<small id="priceErr" class="err"></small>
<input type="number" id="stock" placeholder="Stock">
<small id="stockErr" class="err"></small>

<select id="category" required>
<option value="">Select Category</option>
<option value="pickle">Pickles</option>
<option value="sweet">Sweets</option>
<option value="snack">Snacks</option>
<option value="masala">Masalas</option>
<option value="drink">Cool Drinks</option>
<option value="icecream">Ice Cream</option>
</select>
<small id="catErr" class="err"></small>

<select id="type" required>
<option value="">Select Type</option>
<option value="grams">Grams</option>
<option value="pieces">Pieces</option>
<option value="size">Size</option>
<option value="ml">ML</option>
</select>
<small id="typeErr" class="err"></small>

<input type="file" id="image">
<small id="imgErr" class="err"></small>

<button onclick="addProduct()">Add Product</button>
</div>

<div class="card">
<h2>Products</h2>

<table>
<thead>
<tr>
<th>Image</th>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
<th>Category</th>
<th>Action</th>
</tr>
</thead>

<tbody id="productList"></tbody>
</table>
<h2>Orders</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Amount</th>
<th>Payment ID</th>
<th>Status</th>
<th>Date</th>
</tr>
</thead>

<tbody id="ordersList"></tbody>
</table>
</div>

</div>

<script>
const API = "http://localhost:5000";
// 🔥 ADD PRODUCT
async function addProduct(){

  let name = document.getElementById("name").value.trim();
  let price = document.getElementById("price").value.trim();
  let stock = document.getElementById("stock").value.trim();
  let category = document.getElementById("category").value;
  let type = document.getElementById("type").value;
 
  let file = document.getElementById("image").files[0];

  // 🔥 CLEAR ERRORS
  document.querySelectorAll(".err").forEach(e => e.innerText = "");

  let valid = true;

  if(!name){
    document.getElementById("nameErr").innerText = "Enter product name";
    valid = false;
  }

  if(!price){
    document.getElementById("priceErr").innerText = "Enter price";
    valid = false;
  }

  if(!stock){
    document.getElementById("stockErr").innerText = "Enter stock";
    valid = false;
  }

  if(!category){
    document.getElementById("catErr").innerText = "Select category";
    valid = false;
  }

  if(!type){
    document.getElementById("typeErr").innerText = "Select type";
    valid = false;
  }

  if(!file){
    document.getElementById("imgErr").innerText = "Select image";
    valid = false;
  }

  if(!valid) return;

  // ✅ FORM DATA (IMPORTANT)
  let formData = new FormData();

  formData.append("name", name);
  formData.append("price", price);
  formData.append("stock", stock);
  formData.append("category", category);
  formData.append("type", type);
  formData.append("image", file);

  // ✅ SEND TO SERVER
 let res = await fetch(API + "/add-product",{
  method:"POST",
  body: formData
});

let data = await res.json();

if(data.error){
  alert(data.error);
  return;
}

  showSuccess("Product Added ✅");

  // CLEAR
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("stock").value = "";
  document.getElementById("category").value = "";
  document.getElementById("type").value = "";
  document.getElementById("image").value = "";

  loadProducts();
}
// 🔥 LOAD PRODUCTS
async function loadProducts(){

  let res = await fetch(API + "/products");
  let products = await res.json();
  let list = document.getElementById("productList");
  if(!list) return;
  list.innerHTML = "";

  products.forEach(p=>{
    list.innerHTML += `
    <tr>
      <td>
        <img src="http://localhost:5000/uploads/${p.image}" width="50"></td>
        <td>${p.name}
      </td>
      <td>₹${p.price}</td>
      <td>${p.stock}</td>
      <td>${p.category}</td>
      <td>
        <button onclick="deleteProduct(${p.id})">Delete</button>
      </td>
    </tr>
    `;
  });
 
}

async function loadOrders(){

  let res = await fetch("https://frosty-backend.onrender.com/orders");
  let orders = await res.json();

  let html="";

  orders.forEach(o=>{

    html+=`
    <tr>
      <td>${o.id}</td>
      <td>${o.name}</td>
      <td>${o.email}</td>
      <td>${o.phone || "-"}</td>
      <td>₹${o.amount}</td>
      <td>${o.payment_id || "-"}</td>
      <td>${o.status || "Pending"}</td>
      <td>${new Date(o.created_at).toLocaleString()}</td>
    </tr>
    `;

  });

  document.getElementById("ordersList").innerHTML=html;

}
// 🔥 DELETE PRODUCT
async function deleteProduct(id){


  await fetch(API + "/delete-product/" + id,{
    method:"DELETE"
  });

  showSuccess("Product Deleted ✅");

  loadProducts();
}
async function updateOrder(id){

  await fetch(API+"/update-order/"+id,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      status:"Out for Delivery"
    })
  });

}
// 🔥 PAGE LOAD

function showSuccess(msg){

  let toast = document.createElement("div");

  toast.innerText = msg;

  toast.style.position = "fixed";
  toast.style.top = "20px";
  toast.style.left = "50%";
  toast.style.transform = "translateX(-50%)";
  toast.style.background = "#28a745";
  toast.style.color = "white";
  toast.style.padding = "10px 20px";
  toast.style.borderRadius = "6px";
  toast.style.zIndex = "9999";
  toast.style.fontWeight = "bold";

  document.body.appendChild(toast);

  setTimeout(()=>{
    toast.remove();
  },2000);

}
document.addEventListener("DOMContentLoaded", ()=>{
  loadProducts();
});
loadOrders();
</script>
</body>
</html>
